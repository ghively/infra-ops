# Structure-Conformance Gate (binding)
#
# GitLab CI component: fails the pipeline if any IaC unit deviates from the canonical
# layout (scripts/lib/structure-spec.js). This is what enforces UNIFORM structure across
# the estate — reviewer agents advise; THIS rejects non-conformant code.
#
# Usage in your .gitlab-ci.yml:
#   include:
#     - local: '/.gitlab-ci/components/structure-conformance/template.yml'
#
# Requires the infra-ops validator on the runner. Point VALIDATE_STRUCTURE at it
# (vendored copy, submodule, or the installed plugin). Detected units:
#   roles/*        → ansible-role
#   modules/*      → terraform-module
#   envs/*         → terraform-env
#   . (repo root)  → ansible-repo   (when ansible.cfg is present)

variables:
  NODE_IMAGE: "node:20-alpine"               # pin by digest in the consuming project
  VALIDATE_STRUCTURE: "scripts/validate-structure.js"
  VALIDATE_DEPLOYMENT: "scripts/validate-deployment.js"

structure-conformance:
  stage: validate
  image: ${NODE_IMAGE}
  script:
    - status=0
    - |
      validate() {
        node "$VALIDATE_STRUCTURE" --type "$1" --path "$2" || status=1
      }
    - if [ -f ansible.cfg ]; then validate ansible-repo .; fi
    - if [ -d roles ];   then for d in roles/*/;   do [ -d "$d" ] && validate ansible-role     "$d"; done; fi
    - if [ -d modules ]; then for d in modules/*/; do [ -d "$d" ] && validate terraform-module "$d"; done; fi
    - if [ -d envs ];    then for d in envs/*/;    do [ -d "$d" ] && validate terraform-env    "$d"; done; fi
    - if [ -d packer ];  then for d in packer/*/;  do [ -d "$d" ] && validate packer-template  "$d"; done; fi
    - if [ -d scripts/python ]; then for d in scripts/python/*/; do [ -d "$d" ] && validate python-tool "$d"; done; fi
    - exit $status
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Deployment uniformity: every .gitlab-ci.yml matches the canonical pipeline shape
# (standard stages, the binding gates, environment scoping, manual+protected prod).
deployment-conformance:
  stage: validate
  image: ${NODE_IMAGE}
  script:
    - node "$VALIDATE_DEPLOYMENT" --path .gitlab-ci.yml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
