# Secrets and Vault Patterns — pre-promoted seed instincts
---
instincts:
  - id: secrets-no-hardcoded-credentials
    zone: corporate
    category: secrets
    status: active
    confidence: 1.0
    content: >
      Hardcoded credentials (passwords, API tokens, keys, connection strings) in any
      source-controlled file are a CRITICAL violation. The pan-egress-filter and
      secrets-scanner will block and reject any diff containing these. Use Vault
      lookups at runtime or protected/masked CI variables as a fallback. Gitleaks
      and Secret Detection run in CI and pre-commit as the detection layer.
    citation: "PCI DSS v4.0.1 Req 8.3.1; OWASP Secrets Management"
    evidence:
      - type: standard
        source: "PCI DSS v4.0.1 Requirement 8.3.1"
    promoted_by: infra-ops-development-team
    promoted_at: 2026-06-06

  - id: secrets-vault-approle-for-ansible
    zone: corporate
    category: secrets
    status: active
    confidence: 0.95
    content: >
      The recommended Vault auth method for Ansible pipelines is AppRole.
      `role_id` is stored as a protected CI variable (non-secret); `secret_id` is
      fetched at runtime or stored as a protected/masked CI variable. The Vault
      policy for the AppRole must be scoped to exactly the paths the role needs —
      wildcard `*` policies are never acceptable. Rotate `secret_id` on team member
      departure or suspected compromise.
    citation: "HashiCorp Vault AppRole auth docs; PCI DSS v4.0.1 Req 8.6"
    evidence:
      - type: standard
        source: "HashiCorp Vault documentation — AppRole auth method"
    promoted_by: infra-ops-development-team
    promoted_at: 2026-06-06

  - id: secrets-vault-least-privilege-policy
    zone: corporate
    category: secrets
    status: active
    confidence: 0.95
    content: >
      Every Vault policy must be scoped to the minimum paths and capabilities
      required. `capabilities = ["read"]` for secrets paths. Never grant `write`,
      `delete`, or `sudo` to application service accounts unless explicitly required
      and approved. Audit Vault policies on every team member change. Wildcard paths
      in policies are a HIGH finding.
    citation: "HashiCorp Vault ACL policy docs; PCI DSS v4.0.1 Req 7.2"
    evidence:
      - type: standard
        source: "HashiCorp Vault documentation — policies and ACLs"
    promoted_by: infra-ops-development-team
    promoted_at: 2026-06-06

  - id: secrets-no-tfstate-in-git
    zone: corporate
    category: secrets
    status: active
    confidence: 1.0
    content: >
      Terraform state files (`.tfstate`, `.tfstate.backup`) must never be committed
      to source control. State files contain plaintext values of all managed resource
      attributes including secrets. Use remote state (S3 + DynamoDB lock, GitLab
      Terraform state backend, or Terraform Cloud). Add `*.tfstate` and
      `*.tfstate.backup` to `.gitignore`.
    citation: "HashiCorp Terraform best practices; OWASP IaC Security"
    evidence:
      - type: standard
        source: "HashiCorp Terraform documentation — remote state"
    promoted_by: infra-ops-development-team
    promoted_at: 2026-06-06
